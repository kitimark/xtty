name: pr-lint

# Enforce the repository's Conventional Commits convention on pull-request titles.
# Runs on pull_request only — it does NOT gate direct pushes (it's the contributor
# guard once the repo is public). Uses ubuntu-latest (cheaper; no macOS needed) and
# the auto-provided GITHUB_TOKEN — no custom repository secret required.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    name: PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types — the ones this repo uses (see AGENTS.md → Conventions).
          types: |
            feat
            fix
            docs
            chore
            test
            refactor
            perf
            style
            ci
            build
            revert
          requireScope: false
